name: Release Build

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact_name: release-linux-amd64
          - os: windows-latest
            target: windows-amd64
            artifact_name: release-windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.72

      - name: Add Go bin to PATH (Linux)
        if: runner.os == 'Linux'
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Add Go bin to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "$(go env GOPATH)\bin"

      - name: Build Linux amd64
        if: matrix.target == 'linux-amd64'
        run: wails3 task linux:build ARCH=amd64

      - name: Build Windows amd64
        if: matrix.target == 'windows-amd64'
        shell: pwsh
        run: wails3 task windows:build ARCH=amd64

      - name: Package Linux artifact
        if: matrix.target == 'linux-amd64'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tag="${GITHUB_REF_NAME}"
          bin_file="$(find bin -maxdepth 1 -type f -executable | head -n 1)"
          if [ -z "${bin_file}" ]; then
            echo "No Linux binary found in bin/"
            exit 1
          fi
          base_name="$(basename "${bin_file}")"
          archive="dist/${base_name}-${tag}-linux-amd64.tar.gz"
          tar -czf "${archive}" -C bin "${base_name}"
          echo "Created ${archive}"

      - name: Package Windows artifact
        if: matrix.target == 'windows-amd64'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $tag = "${env:GITHUB_REF_NAME}"
          $binFile = Get-ChildItem -Path bin -Filter *.exe | Select-Object -First 1
          if ($null -eq $binFile) {
            Write-Error "No Windows binary found in bin/"
          }
          $archive = "dist/$($binFile.BaseName)-$tag-windows-amd64.zip"
          Compress-Archive -Path $binFile.FullName -DestinationPath $archive -Force
          Write-Host "Created $archive"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
